<!DOCTYPE html>
<html lang="{{ page.lang | default: 'zh' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="alternate" type="application/atom+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
    <nav class="site-nav">
      <a href="{{ '/' | relative_url }}">中文</a>
      <a href="{{ '/en/' | relative_url }}">English</a>
      <a href="{{ '/about/' | relative_url }}">About</a>
      <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
    </nav>
  </header>

  <main class="content">
    {{ content }}
  </main>

  <footer class="site-footer">
    <p>
      {% if site.github_username %}<a href="https://github.com/{{ site.github_username }}">github</a>{% endif %}
      {% if site.twitter_username %} · <a href="https://twitter.com/{{ site.twitter_username }}">twitter</a>{% endif %}
    </p>
    <p class="muted">{{ site.description }}</p>
  </footer>

  <!-- MathJax for LaTeX math: inline \( \) and display $$ $$ -->
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']]
      },
      options: { skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'] }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>
</body>
</html>
